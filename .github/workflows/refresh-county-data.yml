name: Refresh county housing data

on:
  schedule:
    - cron: "0 15 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Refresh county dataset
        run: python refresh_data.py county

      - name: Commit updated data
        run: |
          if git diff --quiet -- local_data/redfin_wa_county.parquet; then
            echo "County dataset is unchanged."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add local_data/redfin_wa_county.parquet
          git commit -m "Refresh county housing data"
          git push
